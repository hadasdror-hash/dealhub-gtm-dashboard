<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GTM Dashboard — Demos Created (SQL)</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#F7F6F3;--surface:#fff;--border:#E4E3DF;--text:#1A1917;--muted:#888580;--tiny:#B0ADA8}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:13px}
  .header{padding:18px 28px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between}
  .header h1{font-size:15px;font-weight:600}
  .header p{font-size:11px;color:var(--muted);margin-top:2px}
  .back{font-size:11px;color:var(--muted);text-decoration:none;border:1px solid var(--border);border-radius:6px;padding:4px 10px}
  .canvas{max-width:1100px;margin:0 auto;padding:24px 28px}
  .sep{display:flex;align-items:center;gap:10px;margin:20px 0 12px}
  .sep .sl{flex:1;height:1px;background:var(--border)}
  .sep .st{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.7px;color:var(--muted);white-space:nowrap}
  .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
  .kpi{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
  .kpi .kl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
  .kpi .kv{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:500;line-height:1;margin-bottom:5px}
  .kpi .kd{font-size:11px;display:flex;align-items:center;gap:4px}
  .up{color:#15803D}.down{color:#DC2626}.neutral{color:var(--muted)}
  .g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
  .g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:20px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px 20px}
  .card-title{font-size:13px;font-weight:600;margin-bottom:3px}
  .card-sub{font-size:11px;color:var(--muted);margin-bottom:14px}
  .src-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .src-lbl{width:70px;font-size:11px;color:var(--muted);flex-shrink:0}
  .bar-wrap{flex:1;background:#f0f0ee;border-radius:3px;height:7px;overflow:hidden}
  .bar-fill{height:100%;border-radius:3px}
  .src-nums{width:120px;text-align:right;font-size:11px;flex-shrink:0}
  .src-delta{width:50px;text-align:right;font-size:11px;flex-shrink:0}
  .seg-card{background:#f8f8f6;border-radius:8px;padding:12px 14px;border:0.5px solid var(--border)}
  .seg-name{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px}
  .seg-deals{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:500}
  .seg-arr{font-size:10px;color:var(--muted);margin-top:2px}
  .seg-vs{font-size:10px;margin-top:5px}
  .wow-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
  .wow-chip{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:6px 12px;font-size:12px}
  .wow-chip .wl{color:var(--muted)}
  .wow-chip .wv{font-weight:600;font-family:'JetBrains Mono',monospace}
  .footnote{font-size:10px;color:var(--tiny);text-align:center;margin-top:24px;padding-top:14px;border-top:1px solid var(--border)}
  .loading{text-align:center;padding:40px;color:var(--muted)}
  .update-note{font-size:10px;color:var(--muted);background:#FFFBEB;border:1px solid #FDE68A;border-radius:6px;padding:6px 12px;margin-bottom:16px}
</style>
</head>
<body>
<div class="header">
  <div><h1>Demos Created — SQL Pipeline</h1><p id="header-sub">Loading...</p></div>
  <a class="back" href="home.html">← Home</a>
</div>
<div class="canvas">
  <div class="update-note">📊 Dashboard loads from <strong>demos_data.csv</strong> — update that file in GitHub to refresh all numbers automatically.</div>
  <div id="dashboard"><div class="loading">Loading data from CSV...</div></div>
</div>

<script>
const Q2_START = new Date('2026-05-01');
const Q1_START = new Date('2026-02-01');
const Q1_END   = new Date('2026-04-30');
const TODAY    = new Date('2026-06-22');

function fmt(n){ return n >= 1e6 ? '$'+(n/1e6).toFixed(1)+'M' : '$'+(n/1000).toFixed(0)+'K'; }
function fmtN(n){ return n.toLocaleString(); }
function delta(a,b){ if(!b) return ''; const p=((a-b)/b*100).toFixed(0); return (p>=0?'▲ +':'▼ ')+p+'% vs Q1 QTD'; }
function deltaClass(a,b){ return a>=b?'up':'down'; }
function weekStr(d){ const s=new Date(d); s.setDate(s.getDate()-s.getDay()+1); return s.toISOString().slice(0,10); }

Papa.parse('demos_data.csv', {
  download: true,
  header: true,
  complete: function(results) {
    const rows = results.data.filter(r => r['Created Date']);
    rows.forEach(r => {
      r._date = new Date(r['Created Date']);
      r._arr = parseFloat(r['ARR (converted)']) || 0;
      r._sqo = r['Sales Qualified Date'] && r['Sales Qualified Date'].trim() !== '';
    });

    const q2 = rows.filter(r => r._date >= Q2_START && r._date <= TODAY);
    const q1 = rows.filter(r => r._date >= Q1_START && r._date <= Q1_END);
    
    // Q1 QTD = same days into Q1 as Q2
    const q2days = (TODAY - Q2_START) / 86400000;
    const q1qtdEnd = new Date(Q1_START.getTime() + q2days * 86400000);
    const q1qtd = rows.filter(r => r._date >= Q1_START && r._date <= q1qtdEnd);

    // This week / last week
    const thisWkStart = new Date('2026-06-15');
    const lastWkStart = new Date('2026-06-08');
    const lastWkEnd   = new Date('2026-06-14');
    const thisWk = q2.filter(r => r._date >= thisWkStart);
    const lastWk = rows.filter(r => r._date >= lastWkStart && r._date <= lastWkEnd);

    const sumArr = arr => arr.reduce((s,r)=>s+r._arr,0);
    const q2Arr = sumArr(q2), q1qtdArr = sumArr(q1qtd);
    const q2Sqo = q2.filter(r=>r._sqo).length;
    const q2SqoPct = q2.length ? (q2Sqo/q2.length*100).toFixed(0) : 0;

    // Weekly data
    const wkMap = {};
    q2.forEach(r => {
      const wk = weekStr(r._date);
      if(!wkMap[wk]) wkMap[wk]={deals:0,arr:0};
      wkMap[wk].deals++; wkMap[wk].arr+=r._arr;
    });
    const wkMap1 = {};
    q1.forEach(r => {
      const wk = weekStr(r._date);
      if(!wkMap1[wk]) wkMap1[wk]={deals:0,arr:0};
      wkMap1[wk].deals++; wkMap1[wk].arr+=r._arr;
    });
    const q2Weeks = Object.keys(wkMap).sort();
    const q1Weeks = Object.keys(wkMap1).sort();
    const q2Deals = q2Weeks.map(w=>wkMap[w].deals);
    const q1Deals = q1Weeks.map(w=>wkMap1[w].deals);

    // By source
    const bySrc = (arr) => {
      const m={};
      arr.forEach(r=>{ const s=r['Source']||'Other'; if(!m[s])m[s]={deals:0,arr:0}; m[s].deals++;m[s].arr+=r._arr; });
      return m;
    };
    const q2Src=bySrc(q2), q1qtdSrc=bySrc(q1qtd);
    const sources=['Inbound','Outbound','Partners','Other'];
    const srcColors={'Inbound':'#2563EB','Outbound':'#15803D','Partners':'#D97706','Other':'#888580'};
    const maxDeals = Math.max(...sources.map(s=>(q2Src[s]||{deals:0}).deals));

    // By size
    const bySize = (arr) => {
      const m={};
      arr.forEach(r=>{ const s=r['Sales Team Size']||'Unknown'; if(!m[s])m[s]={deals:0,arr:0}; m[s].deals++;m[s].arr+=r._arr; });
      return m;
    };
    const q2Size=bySize(q2), q1qtdSize=bySize(q1qtd);
    const sizes=['Enterprise','MM','SMB'];

    // Update header
    document.getElementById('header-sub').textContent = `FY26 · Q1 (Feb–Apr) & Q2 to date (May–Jun 22) · Updated from CSV`;

    // Render
    document.getElementById('dashboard').innerHTML = `
      <div class="sep"><div class="sl"></div><div class="st">Q2 FY26 — Quarter to date</div><div class="sl"></div></div>
      <div class="kpi-grid">
        <div class="kpi"><div class="kl">Deals created QTD</div><div class="kv">${fmtN(q2.length)}</div>
          <div class="kd ${deltaClass(q2.length,q1qtd.length)}">${delta(q2.length,q1qtd.length)}</div></div>
        <div class="kpi"><div class="kl">ARR created QTD</div><div class="kv">${fmt(q2Arr)}</div>
          <div class="kd ${deltaClass(q2Arr,q1qtdArr)}">${delta(q2Arr,q1qtdArr)}</div></div>
        <div class="kpi"><div class="kl">SQO QTD</div><div class="kv">${fmtN(q2Sqo)}</div>
          <div class="kd neutral">${q2SqoPct}% of SQL</div></div>
        <div class="kpi"><div class="kl">Avg ARR / deal</div><div class="kv">${fmt(q2Arr/Math.max(q2.length,1))}</div>
          <div class="kd neutral">Q1 QTD: ${fmt(q1qtdArr/Math.max(q1qtd.length,1))}</div></div>
      </div>

      <div class="sep"><div class="sl"></div><div class="st">This week vs last week</div><div class="sl"></div></div>
      <div class="wow-chips">
        <div class="wow-chip"><span class="wl">Deals this week</span><span class="wv">${thisWk.length}</span>
          <span class="${deltaClass(thisWk.length,lastWk.length)}">${delta(thisWk.length,lastWk.length).replace('vs Q1 QTD','vs last wk')}</span></div>
        <div class="wow-chip"><span class="wl">ARR this week</span><span class="wv">${fmt(sumArr(thisWk))}</span>
          <span class="${deltaClass(sumArr(thisWk),sumArr(lastWk))}">${delta(sumArr(thisWk),sumArr(lastWk)).replace('vs Q1 QTD','vs last wk')}</span></div>
      </div>

      <div class="g2">
        <div class="card">
          <div class="card-title">By source</div>
          <div class="card-sub">Q2 QTD vs Q1 QTD · deals & ARR</div>
          ${sources.map(s => {
            const q2d=(q2Src[s]||{deals:0,arr:0}); const q1d=(q1qtdSrc[s]||{deals:0,arr:0});
            const pct=maxDeals?Math.round(q2d.deals/maxDeals*100):0;
            const chg=q1d.deals?Math.round((q2d.deals-q1d.deals)/q1d.deals*100):0;
            return `<div class="src-row">
              <span class="src-lbl">${s}</span>
              <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%;background:${srcColors[s]}"></div></div>
              <span class="src-nums"><strong>${q2d.deals}</strong> · ${fmt(q2d.arr)}</span>
              <span class="src-delta ${chg>=0?'up':'down'}">${chg>=0?'▲':'▼'} ${Math.abs(chg)}%</span>
            </div>`;
          }).join('')}
        </div>
        <div class="card">
          <div class="card-title">Weekly trend — deals created</div>
          <div class="card-sub">Q2 (solid) vs Q1 (dashed)</div>
          <div style="height:220px"><canvas id="wkChart"></canvas></div>
        </div>
      </div>

      <div class="sep"><div class="sl"></div><div class="st">By sales team size</div><div class="sl"></div></div>
      <div class="g3">
        ${sizes.map(s => {
          const q2d=(q2Size[s]||{deals:0,arr:0}); const q1d=(q1qtdSize[s]||{deals:0,arr:0});
          const chg=q1d.deals?Math.round((q2d.deals-q1d.deals)/q1d.deals*100):0;
          return `<div class="seg-card">
            <div class="seg-name">${s}</div>
            <div class="seg-deals">${fmtN(q2d.deals)} deals</div>
            <div class="seg-arr">${fmt(q2d.arr)} ARR · avg ${fmt(q2d.arr/Math.max(q2d.deals,1))}</div>
            <div class="seg-vs ${chg>=0?'up':'down'}">${chg>=0?'▲':'▼'} ${Math.abs(chg)}% vs Q1 QTD (${q1d.deals} deals)</div>
          </div>`;
        }).join('')}
      </div>
      <div class="footnote">DealHub GTM Ops · CSV-driven dashboard · Upload new demos_data.csv to GitHub to update</div>
    `;

    // Weekly chart
    const labels = Array.from({length:Math.max(q2Weeks.length,q1Weeks.length)},(_,i)=>`Wk${i+1}`);
    new Chart(document.getElementById('wkChart'),{
      type:'bar',
      data:{
        labels,
        datasets:[
          {label:'Q2 deals',data:[...q2Deals,...Array(Math.max(0,q1Deals.length-q2Deals.length)).fill(null)],backgroundColor:'#2563EB',borderRadius:3},
          {label:'Q1 deals',data:q1Deals,backgroundColor:'rgba(37,99,235,0.15)',borderColor:'#2563EB',borderWidth:1,borderRadius:3}
        ]
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
        scales:{x:{grid:{display:false},ticks:{font:{size:10}}},y:{grid:{color:'#f0f0ee'},ticks:{font:{size:10}},beginAtZero:true}}}
    });
  },
  error: function(e){ document.getElementById('dashboard').innerHTML = '<div class="loading">Error loading demos_data.csv — make sure the file is in the same folder</div>'; }
});
</script>
</body>
</html>
