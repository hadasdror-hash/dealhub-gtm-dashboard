<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DealHub — Segment Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F7F6F3; --surface: #FFFFFF; --border: #E4E3DF;
    --text: #1A1917; --muted: #888580; --tiny: #B0ADA8;
  }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); font-size: 13px; }

  .header { padding: 18px 28px; border-bottom: 1px solid var(--border); background: var(--surface); position: sticky; top: 0; z-index: 10; display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 14px; font-weight: 600; }
  .header p { font-size: 11px; color: var(--muted); }
  .back-btn { font-size: 11px; color: var(--muted); text-decoration: none; display: flex; align-items: center; gap: 4px; }
  .back-btn:hover { color: var(--text); }

  .canvas { padding: 24px 28px; max-width: 1100px; margin: 0 auto; }

  /* FILTERS */
  .filters { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; margin-bottom: 20px; }
  .filters-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.7px; color: var(--muted); margin-bottom: 12px; }
  .filter-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .filter-group { display: flex; flex-direction: column; gap: 4px; min-width: 140px; }
  .filter-group label { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .filter-group select { font-size: 11px; font-family: inherit; border: 1px solid var(--border); border-radius: 6px; padding: 5px 8px; background: var(--bg); color: var(--text); cursor: pointer; }
  .filter-group select:focus { outline: none; border-color: #888; }
  .reset-btn { margin-top: 14px; font-size: 11px; font-weight: 500; padding: 5px 12px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); cursor: pointer; color: var(--muted); }
  .reset-btn:hover { background: var(--border); color: var(--text); }
  .filter-summary { font-size: 11px; color: var(--muted); margin-top: 10px; }
  .filter-summary strong { color: var(--text); }

  /* SEGMENT CARDS */
  .seg-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
  .seg-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
  .seg-card .sc-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 4px; }
  .seg-card .sc-count { font-family: 'JetBrains Mono', monospace; font-size: 26px; font-weight: 600; line-height: 1; margin-bottom: 2px; }
  .seg-card .sc-total { font-size: 10px; color: var(--muted); margin-bottom: 8px; }
  .seg-card .sc-bar { height: 7px; border-radius: 4px; overflow: hidden; display: flex; gap: 1px; margin-bottom: 4px; }
  .seg-card .sc-pcts { display: flex; justify-content: space-between; font-size: 9px; }

  /* OVERLAP TABLE */
  .overlap-table { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; }
  .overlap-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.7px; color: var(--muted); margin-bottom: 12px; }
  table { width: 100%; border-collapse: collapse; font-size: 11px; }
  th { text-align: left; padding: 6px 10px; font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); border-bottom: 1px solid var(--border); }
  td { padding: 7px 10px; border-bottom: 0.5px solid #F3F2EF; font-family: 'JetBrains Mono', monospace; }
  tr:last-child td { border-bottom: none; }
  td:first-child { font-family: 'Inter', sans-serif; font-weight: 500; }
  .pct-cell { color: var(--muted); font-size: 10px; }

  .loading { text-align: center; padding: 40px; color: var(--muted); }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>DealHub — Segment Explorer</h1>
    <p>Filter segments by region, CRM, industry, size and ICP fit</p>
  </div>
  <a class="back-btn" href="fy25.html">← Back to FY25</a>
</div>

<div class="canvas">

  <!-- FILTERS -->
  <div class="filters">
    <div class="filters-title">Filters</div>
    <div class="filter-row">
      <div class="filter-group">
        <label>Region</label>
        <select id="f-region" onchange="applyFilters()">
          <option value="">All regions</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Current CRM</label>
        <select id="f-crm" onchange="applyFilters()">
          <option value="">All CRMs</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Verified SaaS</label>
        <select id="f-saas" onchange="applyFilters()">
          <option value="">All</option>
          <option value="Yes">Yes</option>
          <option value="No">No</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Company size</label>
        <select id="f-size" onchange="applyFilters()">
          <option value="">All sizes</option>
        </select>
      </div>
      <div class="filter-group">
        <label>ICP Fit</label>
        <select id="f-icp" onchange="applyFilters()">
          <option value="">All</option>
          <option value="Strong">Strong</option>
          <option value="Moderate">Moderate</option>
          <option value="Weak">Weak</option>
        </select>
      </div>
      <button class="reset-btn" onclick="resetFilters()">Reset all</button>
    </div>
    <div class="filter-summary" id="filter-summary">Loading data...</div>
  </div>

  <!-- SEGMENT CARDS -->
  <div class="seg-grid" id="seg-grid">
    <div class="loading">Loading segment data...</div>
  </div>

  <!-- OVERLAP TABLE -->
  <div class="overlap-table">
    <div class="overlap-title">Segment overlap — filtered view</div>
    <table id="overlap-table">
      <thead>
        <tr>
          <th>Segment</th>
          <th>Count</th>
          <th>% of total filtered</th>
          <th>∩ TAM</th>
          <th>∩ SDR</th>
          <th>∩ DISP</th>
          <th>∩ Series B+</th>
          <th>∩ Sales roles</th>
          <th>∩ Old opps</th>
          <th>∩ Intent</th>
        </tr>
      </thead>
      <tbody id="overlap-tbody"></tbody>
    </table>
  </div>

</div>

<script>
let ALL_DATA = [];

const SEGMENTS = [
  { key: 't',  label: 'Marketing — TAM',      total: 12903, bg: '#DBEAFE', border: '#BFDBFE', text: '#1E3A8A', barU: '#2563EB', barO: '#93C5FD' },
  { key: 'sd', label: 'SDR (FY25)',           total: 4694,  bg: '#D1FAE5', border: '#A7F3D0', text: '#064E3B', barU: '#15803D', barO: '#86EFAC' },
  { key: 'd',  label: 'DISP',                 total: 3699,  bg: '#FEE2E2', border: '#FECACA', text: '#7F1D1D', barU: '#DC2626', barO: '#FCA5A5' },
  { key: 'b',  label: 'Series B+ · 200+ emp', total: 1902,  bg: '#D1FAE5', border: '#6EE7B7', text: '#064E3B', barU: '#059669', barO: '#6EE7B7' },
  { key: 'ro', label: 'Sales Opp Roles',      total: 9329,  bg: '#EDE9FE', border: '#DDD6FE', text: '#4C1D95', barU: '#7C3AED', barO: '#C4B5FD' },
  { key: 'o',  label: 'Old Opps (excl. Won)', total: 6680,  bg: '#FEF3C7', border: '#FDE68A', text: '#78350F', barU: '#D97706', barO: '#FCD34D' },
  { key: 'i',  label: 'Intent Signal',            total: 33933, bg: '#FEE2E2', border: '#FECACA', text: '#7F1D1D', barU: '#DC2626', barO: '#FCA5A5' },
];

async function loadData() {
  try {
    const res = await fetch('segments_data.json');
    ALL_DATA = await res.json();
    populateFilters();
    applyFilters();
  } catch(e) {
    document.getElementById('filter-summary').textContent = 'Error loading data: ' + e.message;
  }
}

function populateFilters() {
  const regions = [...new Set(ALL_DATA.map(d => d.r).filter(v => v && v !== 'Unknown'))].sort();
  const crms = [...new Set(ALL_DATA.map(d => d.c).filter(v => v && v !== 'Unknown'))].sort();
  const sizes = ['Under 50','51 - 100','101 - 200','201-250','251- 500','501 - 1,000','1,001 - 5,000','5,001-10,000','10001+'];

  const addOpts = (id, vals) => {
    const sel = document.getElementById(id);
    vals.forEach(v => { const o = document.createElement('option'); o.value = v; o.textContent = v; sel.appendChild(o); });
  };
  addOpts('f-region', regions);
  addOpts('f-crm', crms);
  addOpts('f-size', sizes);
}

function applyFilters() {
  const region = document.getElementById('f-region').value;
  const crm = document.getElementById('f-crm').value;
  const saas = document.getElementById('f-saas').value;
  const size = document.getElementById('f-size').value;
  const icp = document.getElementById('f-icp').value;

  const filtered = ALL_DATA.filter(d =>
    (!region || d.r === region) &&
    (!crm    || d.c === crm) &&
    (!saas   || d.v === saas) &&
    (!size   || d.s === size) &&
    (!icp    || d.p === icp)
  );

  const total = filtered.length;
  const activeFilters = [region,crm,saas,size,icp].filter(Boolean).length;
  document.getElementById('filter-summary').innerHTML =
    `Showing <strong>${total.toLocaleString()}</strong> accounts${activeFilters ? ` matching ${activeFilters} filter${activeFilters>1?'s':''}` : ' (no filters applied)'} · Total master list: <strong>${ALL_DATA.length.toLocaleString()}</strong>`;

  renderCards(filtered);
  renderOverlap(filtered);
}

function resetFilters() {
  ['f-region','f-crm','f-saas','f-size','f-icp'].forEach(id => document.getElementById(id).value = '');
  applyFilters();
}

function renderCards(filtered) {
  const grid = document.getElementById('seg-grid');
  grid.innerHTML = '';
  const total = filtered.length || 1;

  SEGMENTS.forEach(seg => {
    const inSeg = filtered.filter(d => d[seg.key] === 1);
    const others = SEGMENTS.filter(s => s.key !== seg.key);
    const inAny = inSeg.filter(d => others.some(s => d[s.key] === 1));
    const uniqueOnly = inSeg.length - inAny.length;
    const uniquePct = inSeg.length ? Math.round(uniqueOnly / inSeg.length * 100) : 0;
    const overlapPct = 100 - uniquePct;

    const card = document.createElement('div');
    card.className = 'seg-card';
    card.style.cssText = `background:${seg.bg};border-color:${seg.border}`;
    card.innerHTML = `
      <div class="sc-label" style="color:${seg.text}">${seg.label}</div>
      <div class="sc-count" style="color:${seg.text}">${inSeg.length.toLocaleString()}</div>
      <div class="sc-total" style="color:${seg.text};opacity:0.7;">of ${seg.total.toLocaleString()} total · ${inSeg.length ? Math.round(inSeg.length/seg.total*100) : 0}% of segment</div>
      <div class="sc-bar">
        <div style="width:${uniquePct}%;background:${seg.barU};border-radius:4px 0 0 4px;"></div>
        <div style="width:${overlapPct}%;background:${seg.barO};border-radius:0 4px 4px 0;"></div>
      </div>
      <div class="sc-pcts">
        <span style="color:${seg.text};font-weight:600;">${uniquePct}% unique only</span>
        <span style="color:${seg.text};opacity:0.6;">${overlapPct}% overlap</span>
      </div>`;
    grid.appendChild(card);
  });
}

function renderOverlap(filtered) {
  const tbody = document.getElementById('overlap-tbody');
  tbody.innerHTML = '';
  const total = filtered.length || 1;

  SEGMENTS.forEach(seg => {
    const inSeg = filtered.filter(d => d[seg.key] === 1);
    const n = inSeg.length;
    if (n === 0) { const tr = document.createElement('tr'); tr.innerHTML = `<td>${seg.label}</td><td>0</td><td class="pct-cell">—</td><td>—</td><td>—</td><td>—</td><td>—</td><td>—</td><td>—</td>`; tbody.appendChild(tr); return; }

    const overlap = (key) => {
      const c = inSeg.filter(d => d[key] === 1).length;
      return c ? `${c.toLocaleString()} <span style="color:var(--muted);font-size:9px;">(${Math.round(c/n*100)}%)</span>` : '—';
    };

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="font-weight:500;">${seg.label}</td>
      <td>${n.toLocaleString()}</td>
      <td class="pct-cell">${Math.round(n/total*100)}%</td>
      <td>${seg.key !== 't'  ? overlap('t')  : '—'}</td>
      <td>${seg.key !== 'sd' ? overlap('sd') : '—'}</td>
      <td>${seg.key !== 'd'  ? overlap('d')  : '—'}</td>
      <td>${seg.key !== 'b'  ? overlap('b')  : '—'}</td>
      <td>${seg.key !== 'ro' ? overlap('ro') : '—'}</td>
      <td>${seg.key !== 'o'  ? overlap('o')  : '—'}</td>
      <td>${seg.key !== 'i'  ? overlap('i')  : '—'}</td>`;
    tbody.appendChild(tr);
  });
}

loadData();
</script>
</body>
</html>
